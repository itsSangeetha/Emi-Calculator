<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>EMI Calculator</title>
  <style>
    :root{--primary:#2563eb;--muted:#6b7280;--bg:#f9fafb}
    *{box-sizing:border-box}
    body{font-family:system-ui,Segoe UI,Roboto,sans-serif;background:var(--bg);margin:0;padding:24px;color:#111}
    .card{max-width:920px;margin:0 auto;background:#fff;padding:18px;border-radius:12px;box-shadow:0 8px 30px rgba(15,23,42,0.06)}
    h1{margin:0 0 12px;font-size:1.4rem;color:var(--primary)}
    form{display:grid;gap:12px;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));align-items:end}
    label{font-size:0.85rem;color:var(--muted);display:block;margin-bottom:6px}
    input,select{width:100%;padding:10px;border-radius:8px;border:1px solid #e5e7eb;font-size:0.95rem}
    .controls{display:flex;gap:10px;flex-wrap:wrap}
    button{background:var(--primary);color:white;padding:10px 14px;border:0;border-radius:8px;cursor:pointer;font-weight:600}
    button.ghost{background:#fff;border:1px solid #e5e7eb;color:#111}
    .results{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-top:14px}
    .stat{background:#f8fafc;padding:12px;border-radius:8px}
    .stat strong{display:block;font-size:1.1rem;color:#111}
    .table-wrap{margin-top:16px;overflow:auto}
    table{width:100%;border-collapse:collapse;font-size:0.9rem}
    th,td{padding:8px;text-align:right;border-bottom:1px solid #eef2f7}
    th{background:#fbfdff;text-align:right;position:sticky;top:0}
    td.left,th.left{text-align:left}
    .small{font-size:0.85rem;color:var(--muted)}
    @media(max-width:520px){form{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="card" role="main">
    <h1>EMI Calculator</h1>
    <p class="small">Enter principal, interest and tenure to calculate monthly EMI, total payment and interest. Amortization table is shown below.</p>

    <form id="emiForm" onsubmit="event.preventDefault(); calculateEMI();">
      <div>
        <label for="principal">Principal (loan amount)</label>
        <input id="principal" type="number" min="0" step="0.01" value="500000" required />
      </div>

      <div>
        <label for="annualRate">Annual Interest Rate (%)</label>
        <input id="annualRate" type="number" min="0" step="0.01" value="7.5" required />
      </div>

      <div>
        <label for="tenureYears">Tenure (years)</label>
        <input id="tenureYears" type="number" min="0" step="1" value="20" required />
      </div>

      <div>
        <label for="paymentsPerYear">Payments per year</label>
        <select id="paymentsPerYear" aria-label="payments per year">
          <option value="12" selected>Monthly (12)</option>
          <option value="4">Quarterly (4)</option>
          <option value="1">Yearly (1)</option>
        </select>
      </div>

      <div class="controls" style="grid-column:1/-1;">
        <button type="submit">Calculate</button>
        <button type="button" class="ghost" onclick="resetForm()">Reset</button>
        <button id="downloadCsv" type="button" class="ghost" onclick="downloadCSV()" disabled>Export CSV</button>
      </div>
    </form>

    <div class="results" id="results" style="display:none">
      <div class="stat">
        <span class="small">Monthly EMI</span>
        <strong id="emiValue">—</strong>
      </div>
      <div class="stat">
        <span class="small">Total Payment</span>
        <strong id="totalPayment">—</strong>
      </div>
      <div class="stat">
        <span class="small">Total Interest</span>
        <strong id="totalInterest">—</strong>
      </div>
      <div class="stat">
        <span class="small">Number of Payments</span>
        <strong id="numPayments">—</strong>
      </div>
    </div>

    <div class="table-wrap" id="scheduleWrap" style="display:none">
      <h3 style="margin:12px 0 8px">Amortization Schedule</h3>
      <table id="scheduleTable" aria-describedby="amortization">
        <thead>
          <tr>
            <th class="left">#</th>
            <th>Payment</th>
            <th>Interest</th>
            <th>Principal</th>
            <th>Balance</th>
          </tr>
        </thead>
        <tbody id="scheduleBody"></tbody>
      </table>
    </div>
  </div>

  <script>
    function round(n){ return Math.round((n + Number.EPSILON) * 100) / 100; }

    function calculateEMI() {
      // read inputs
      const P = parseFloat(document.getElementById('principal').value) || 0;
      const annualRate = parseFloat(document.getElementById('annualRate').value) || 0;
      const years = parseInt(document.getElementById('tenureYears').value) || 0;
      const freq = parseInt(document.getElementById('paymentsPerYear').value) || 12;

      if (P <= 0 || years <= 0 || freq <= 0) {
        alert('Please enter valid positive values.');
        return;
      }

      const n = years * freq;                    // total payments
      const r = (annualRate / 100) / freq;       // periodic interest rate

      // EMI formula: if r == 0 => EMI = P / n
      let emi;
      if (r === 0) {
        emi = P / n;
      } else {
        const pow = Math.pow(1 + r, n);
        emi = P * r * pow / (pow - 1);
      }

      // totals
      const totalPayment = emi * n;
      const totalInterest = totalPayment - P;

      // display results
      document.getElementById('emiValue').textContent = formatCurrency(emi);
      document.getElementById('totalPayment').textContent = formatCurrency(totalPayment);
      document.getElementById('totalInterest').textContent = formatCurrency(totalInterest);
      document.getElementById('numPayments').textContent = n;

      document.getElementById('results').style.display = 'grid';

      // amortization schedule
      const body = document.getElementById('scheduleBody');
      body.innerHTML = '';
      let balance = P;
      const rows = [];

      for (let i = 1; i <= n; i++) {
        let interest = r === 0 ? 0 : balance * r;
        // protect against floating precision last payment:
        let principalPayment = emi - interest;
        if (i === n) {
          // final adjust to zero out small rounding errors
          principalPayment = balance;
          emi = principalPayment + interest;
        }
        balance = round(balance - principalPayment);
        rows.push({i, payment: round(emi), interest: round(interest), principal: round(principalPayment), balance: Math.max(0, round(balance))});
      }

      // populate table
      rows.forEach(row => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td class="left">${row.i}</td>
                        <td>${formatCurrency(row.payment)}</td>
                        <td>${formatCurrency(row.interest)}</td>
                        <td>${formatCurrency(row.principal)}</td>
                        <td>${formatCurrency(row.balance)}</td>`;
        body.appendChild(tr);
      });

      document.getElementById('scheduleWrap').style.display = '';
      // enable CSV export
      window.__emiRows = rows; // for CSV download
      document.getElementById('downloadCsv').disabled = false;
    }

    function formatCurrency(v){
      // simple formatting: two decimals + thousands separators
      const n = Number(Math.round((v + Number.EPSILON) * 100) / 100);
      return n.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2});
    }

    function resetForm(){
      document.getElementById('emiForm').reset();
      document.getElementById('results').style.display = 'none';
      document.getElementById('scheduleWrap').style.display = 'none';
      document.getElementById('downloadCsv').disabled = true;
      window.__emiRows = null;
    }

    function downloadCSV(){
      const rows = window.__emiRows;
      if (!rows || rows.length === 0) return alert('Nothing to export. Calculate first.');
      const header = ['#','Payment','Interest','Principal','Balance'];
      const csv = [header.join(',')].concat(rows.map(r => [r.i, r.payment, r.interest, r.principal, r.balance].join(','))).join('\n');
      const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'amortization_schedule.csv';
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    // init: optional auto-calc on load
    // calculateEMI();
  </script>
</body>
</html>
